<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Explanation</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f4f7fb;
      }

      /* LAYOUT */
      .container {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        background: linear-gradient(to bottom, #007bff, #0056b3);
        color: white;
        padding: 20px;
      }

      .sidebar h3 {
        margin-bottom: 30px;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 10px;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* MAIN */
      .main {
        flex: 1;
        padding: 30px;
        display: flex;
        justify-content: center;
      }

      /* CARD */
      .card {
        width: 800px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      }

      /* TITLE */
      .title {
        text-align: center;
        margin-bottom: 20px;
      }

      /* SECTION */
      .section {
        margin-bottom: 20px;
      }

      .section h3 {
        color: #007bff;
        margin-bottom: 8px;
      }

      .section p {
        font-size: 14px;
        line-height: 1.6;
        color: #333;
        white-space: pre-line;
      }

      /* BUTTON */
      .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border-radius: 6px;
        text-decoration: none;
      }

      .btn:hover {
        background: #0056b3;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h3>🧴 Skin Disease AI</h3>

        <a href="/home"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/history"><i class="fas fa-upload"></i> History</a>
        <a href="/ask"><i class="fas fa-comments"></i> AI Chat</a>
        <a href="/upload"><i class="fas fa-upload"></i> Upload</a>
        <a href="/about"><i class="fas fa-info-circle"></i> About</a>
        <a href="/contact"><i class="fas fa-phone"></i> Contact</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>

      <!-- MAIN -->
      <div class="main">
        <div class="card">
          <h2 class="title">🧠 AI Explanation for: {{ label }}</h2>

          <div class="section">
            <h3>1. Explanation</h3>
            <p id="explanation"></p>
          </div>

          <div class="section">
            <h3>2. Symptoms</h3>
            <p id="symptoms"></p>
          </div>

          <div class="section">
            <h3>3. Risk Factors</h3>
            <p id="risk"></p>
          </div>

          <div class="section">
            <h3>4. Prevention</h3>
            <p id="prevention"></p>
          </div>

          <div class="section">
            <h3>5. Additional Notes</h3>
            <p id="notes"></p>
          </div>

          <a href="/upload" class="btn">⬅ Back</a>
        </div>
      </div>
    </div>

    <script>
      // Raw AI response
      let answer = `{{ answer | safe }}`;

      // 🔥 CLEAN TEXT (remove markdown ** etc.)
      answer = answer.replace(/\*\*/g, "");

      // 🔥 IMPROVED EXTRACTION
      function extractSection(keyword) {
        let regex = new RegExp(keyword + "\\s*:(.*?)(\\n\\s*\\d\\.|$)", "is");
        let match = answer.match(regex);
        return match ? match[1].trim() : "Not available";
      }

      // SET DATA
      document.getElementById("explanation").innerText =
        extractSection("Explanation");

      document.getElementById("symptoms").innerText =
        extractSection("Symptoms");

      document.getElementById("risk").innerText =
        extractSection("Risk Factors");

      document.getElementById("prevention").innerText =
        extractSection("Prevention");

      document.getElementById("notes").innerText =
        extractSection("Additional Notes");
    </script>
  </body>
</html>
