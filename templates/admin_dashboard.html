<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f4f7fb;
      }

      /* LAYOUT */
      .container {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        background: linear-gradient(to bottom, #1e5799, #207cca);
        color: white;
        padding: 20px;
      }

      .sidebar h3 {
        margin-bottom: 30px;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 10px;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* MAIN */
      .main {
        flex: 1;
        padding: 20px;
      }

      /* HEADER */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* CARDS */
      .cards {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        flex: 1;
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .card i {
        font-size: 30px;
        color: #1e5799;
        margin-bottom: 10px;
      }

      /* ACTION BUTTONS */
      .actions {
        margin-top: 30px;
      }

      .actions a {
        display: inline-block;
        margin-right: 15px;
        padding: 10px 15px;
        background: #1e5799;
        color: white;
        border-radius: 6px;
        text-decoration: none;
      }

      .actions a:hover {
        background: #163f73;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        margin-top: 40px;
        font-size: 12px;
        color: gray;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .cards {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <h3>⚙️ Admin Panel</h3>

        <a href="/admin"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/users"><i class="fas fa-users"></i> Users</a>
        <a href="/admin/history"><i class="fas fa-clock"></i> History</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>

      <!-- MAIN -->

      <div class="main">
        <div class="header">
          <h2>📊 Admin Dashboard</h2>
        </div>

        <!-- CARDS -->
        <div class="cards">
          <div class="card">
            <i class="fas fa-users"></i>
            <h3>Total Users</h3>
            <h1>{{ total_users }}</h1>
          </div>

          <div class="card">
            <i class="fas fa-chart-line"></i>
            <h3>Total Predictions</h3>
            <h1>{{ total_predictions }}</h1>
          </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="actions">
          <a href="/admin/users"><i class="fas fa-users"></i> View Users</a>
          <a href="/admin/history"><i class="fas fa-clock"></i> View History</a>
        </div>

        <div class="footer">© 2026 Smart Health Admin Panel</div>
      </div>
    </div>
  </body>
</html>
