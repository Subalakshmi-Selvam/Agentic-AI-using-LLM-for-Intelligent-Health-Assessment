<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PDF & Image Chatbot</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        min-height: 100vh;
      }

      /* ================= SIDEBAR ================= */
      .sidebar {
        width: 240px;
        background: #020617;
        padding: 20px;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
      }

      .sidebar h3 {
        color: #3b82f6;
        margin-bottom: 25px;
      }

      .sidebar a {
        display: block;
        color: #cbd5e1;
        text-decoration: none;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        transition: 0.3s;
      }

      .sidebar a:hover {
        background: #1e293b;
        color: white;
      }

      .sidebar i {
        margin-right: 10px;
      }

      .logout {
        color: #ef4444 !important;
      }

      /* ================= MAIN ================= */
      .main {
        margin-left: 240px;
        width: calc(100% - 240px);
        padding: 30px;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .title {
        margin-bottom: 20px;
        color: #38bdf8;
      }

      /* ================= UPLOAD ================= */
      .upload-box {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
      }

      .upload-box input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #334155;
        color: white;
        margin-bottom: 15px;
      }

      /* ================= CHAT ================= */
      .chat-box {
        background: #1e293b;
        height: 500px;
        overflow-y: auto;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
      }

      .message {
        margin-bottom: 15px;
        max-width: 80%;
        padding: 12px 15px;
        border-radius: 12px;
        line-height: 1.5;
      }

      .user {
        background: #2563eb;
        margin-left: auto;
        text-align: right;
      }

      .bot {
        background: #334155;
        margin-right: auto;
        white-space: pre-wrap;
      }

      /* ================= INPUT ================= */
      .input-area {
        display: flex;
        gap: 10px;
      }

      .input-area input {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #1e293b;
        color: white;
        font-size: 15px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 15px;
      }

      button:hover {
        background: #2563eb;
      }

      .typing {
        color: #94a3b8;
        font-style: italic;
        margin-top: 10px;
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }

        .main {
          margin-left: 0;
          width: 100%;
          padding: 15px;
        }

        .input-area {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">
      <h3><i class="fa-solid fa-robot"></i> AI Chatbot</h3>

      <a href="#">
        <i class="fa-solid fa-house"></i>
        Home
      </a>

      <a href="#">
        <i class="fa-solid fa-file-pdf"></i>
        Documents
      </a>

      <a href="#">
        <i class="fa-solid fa-image"></i>
        Images
      </a>

      <a href="#">
        <i class="fa-solid fa-clock-rotate-left"></i>
        History
      </a>

      <a href="#" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
      </a>
    </div>

    <!-- ================= MAIN ================= -->
    <div class="main">
      <div class="container">

        <h1 class="title">
          📄 PDF & Image Chatbot
        </h1>

        <!-- Upload -->
        <div class="upload-box">
          <input
            type="file"
            id="pdfFile"
            multiple
            accept=".pdf,.png,.jpg,.jpeg"
          />

          <button onclick="uploadPDF()">
            <i class="fa-solid fa-upload"></i>
            Upload Files
          </button>
        </div>

        <!-- Chat -->
        <div class="chat-box" id="chatBox">
          <div class="message bot">
            👋 Hello! Upload a PDF or Image and ask questions.
          </div>
        </div>

        <!-- Input -->
        <div class="input-area">
          <input
            type="text"
            id="question"
            placeholder="Ask something about uploaded files..."
            onkeypress="handleEnter(event)"
          />

          <button onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
            Send
          </button>
        </div>

        <div class="typing" id="typing"></div>

      </div>
    </div>

    <script>
      // ================= UPLOAD =================
      async function uploadPDF() {
        const fileInput = document.getElementById("pdfFile");

        if (!fileInput.files.length) {
          alert("Please select files");
          return;
        }

        const formData = new FormData();

        for (let i = 0; i < fileInput.files.length; i++) {
          formData.append("file", fileInput.files[i]);
        }

        try {
          document.getElementById("typing").innerText =
            "Uploading and processing files...";

          const res = await fetch("/upload-pdf", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          document.getElementById("typing").innerText = "";

          alert(data.message || data.error);

        } catch (err) {
          document.getElementById("typing").innerText = "";
          alert("Upload failed");
        }
      }

      // ================= SEND MESSAGE =================
      async function sendMessage() {
        const questionInput = document.getElementById("question");

        const question = questionInput.value.trim();

        if (!question) return;

        const chatBox = document.getElementById("chatBox");

        // USER MESSAGE
        chatBox.innerHTML += `
          <div class="message user">
            👤 ${question}
          </div>
        `;

        questionInput.value = "";

        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          document.getElementById("typing").innerText =
            "AI is typing...";

          const res = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              question: question,
            }),
          });

          const data = await res.json();

          document.getElementById("typing").innerText = "";

          // BOT MESSAGE
          chatBox.innerHTML += `
            <div class="message bot">
              🤖 ${data.reply || data.error}
            </div>
          `;

        } catch (err) {

          document.getElementById("typing").innerText = "";

          chatBox.innerHTML += `
            <div class="message bot">
              ⚠️ Server error
            </div>
          `;
        }

        chatBox.scrollTop = chatBox.scrollHeight;
      }

      // ================= ENTER KEY =================
      function handleEnter(event) {
        if (event.key === "Enter") {
          sendMessage();
        }
      }
    </script>
  </body>
</html>
