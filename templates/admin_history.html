<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>All User History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f4f7fb;
      }

      /* LAYOUT */
      .container {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        background: linear-gradient(to bottom, #1e5799, #207cca);
        color: white;
        padding: 20px;
      }

      .sidebar h3 {
        margin-bottom: 30px;
      }

      .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 10px;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* MAIN */
      .main {
        flex: 1;
        padding: 20px;
      }

      /* TITLE */
      .title {
        margin-bottom: 20px;
      }

      /* TABLE */
      .table-container {
        background: white;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #1e5799;
        color: white;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      /* IMAGE */
      img {
        width: 70px;
        border-radius: 6px;
      }

      /* BUTTON */
      .btn {
        padding: 6px 10px;
        background: #1e5799;
        color: white;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        font-size: 12px;
      }

      .btn:hover {
        background: #163f73;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <h3>⚙️ Admin Panel</h3>

        <a href="/admin"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/users"><i class="fas fa-users"></i> Users</a>
        <a href="/admin/history"><i class="fas fa-clock"></i> History</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>

      <!-- MAIN -->

      <div class="main">
        <h2 class="title">📜 All User History</h2>

        <div class="table-container">
          <table>
            <tr>
              <th>ID</th>
              <th>User</th>
              <th>Image</th>
              <th>Label</th>
              <th>Date</th>
              <th>Report</th>
            </tr>

            {% for row in data %}
            <tr>
              <td>{{ row[0] }}</td>
              <td>{{ row[1] }}</td>

              <td>
                <img src="/static/uploads/{{ row[2] }}" />
              </td>

              <td>{{ row[3] }}</td>
              <td>{{ row[4] }}</td>

              <!-- DOWNLOAD BUTTON -->
              <td>
                <form action="/download_report_admin" method="POST">
                  <input type="hidden" name="userid" value="{{ row[5] }}" />
                  <input type="hidden" name="label" value="{{ row[3] }}" />
                  <input type="hidden" name="image" value="{{ row[2] }}" />

                  <button type="submit" class="btn">
                    <i class="fas fa-file-download"></i> Download
                  </button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </table>
        </div>

        <br />
        <a href="/admin" class="btn">⬅ Back</a>
      </div>
    </div>
  </body>
</html>
